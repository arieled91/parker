export default "<div class=\"ion-page\" id=\"main\">\n    <ion-header>\n        <ion-toolbar color=\"primary\">\n            <ion-buttons slot=\"start\">\n                <ion-menu-button></ion-menu-button>\n            </ion-buttons>\n            <ion-title>{{title}}</ion-title>\n            <ion-buttons slot=\"end\">\n                <ion-back-button defaultHref=\"/\" ></ion-back-button>\n            </ion-buttons>\n        </ion-toolbar>\n    </ion-header>\n    <ion-content class=\"ion-padding\">\n        <div [formGroup]=\"carForm\" *ngIf=\"car\">\n            <ion-item>\n                <ion-label position=\"floating\" color=\"primary\">Nombre:</ion-label>\n                <ion-input formControlName=\"name\" minlength=\"3\" style=\"font-size: 20px\"></ion-input>\n            </ion-item>\n            <ion-item>\n                <ion-label position=\"floating\">Marca:</ion-label>\n                <ion-input formControlName=\"brand\"></ion-input>\n            </ion-item>\n            <ion-item>\n                <ion-label position=\"floating\" >Modelo:</ion-label>\n                <ion-input formControlName=\"model\"></ion-input>\n            </ion-item>\n\n            <ion-item>\n                <ion-label position=\"floating\" >Descripción:</ion-label>\n                <ion-input formControlName=\"description\"></ion-input>\n            </ion-item>\n\n            <ion-fab vertical=\"bottom\" horizontal=\"end\" slot=\"fixed\">\n                <ion-fab-button (click)=\"onSave()\">\n                    <ion-icon name=\"save-outline\"></ion-icon>\n                </ion-fab-button>\n            </ion-fab>\n        </div>\n    </ion-content>\n</div>\n"
